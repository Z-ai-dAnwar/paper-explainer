<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Narrated explainer</title>
<style>
  :root{
    --ground:#0b0f15; --panel:#111823; --panel2:#0e141d;
    --ink:#eaf0f6; --muted:#8b98a8; --faint:#5a6675;
    --psp:#f2a54e; --pd:#4fbfd6; --hc:#b98cd0; --accent:#f2a54e;
    --line:rgba(255,255,255,.10);
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:radial-gradient(1200px 600px at 50% -10%, #16202d 0%, var(--ground) 55%);
    color:var(--ink); font-family:var(--sans); min-height:100vh;}
  .wrap{max-width:940px; margin:0 auto; padding:clamp(14px,3vw,30px); display:flex; flex-direction:column; gap:14px}
  .masthead{display:flex; align-items:baseline; justify-content:space-between; gap:12px}
  .masthead h1{font-size:clamp(15px,2.4vw,19px); font-weight:650; letter-spacing:-.01em; margin:0}
  .masthead .k{font-family:var(--mono); font-size:11px; color:var(--faint); letter-spacing:.08em; text-transform:uppercase}

  .player{background:linear-gradient(180deg,var(--panel),var(--panel2)); border:1px solid var(--line);
    border-radius:16px; overflow:hidden; box-shadow:0 24px 60px -30px rgba(0,0,0,.8);}
  .stagewrap{position:relative; aspect-ratio:16/9; background:linear-gradient(180deg,#0c121b,#0a0e15); border-bottom:1px solid var(--line);}
  .stage{position:absolute; inset:0; overflow:hidden}
  .stage canvas{display:block; width:100%; height:100%}
  .eyebrow{position:absolute; top:14px; left:16px; z-index:5; font-family:var(--mono); font-size:11px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--accent); display:flex; align-items:center; gap:8px}
  .eyebrow .num{color:var(--faint)}
  .eyebrow .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)}
  .caption{position:absolute; left:0; right:0; bottom:0; z-index:5; padding:20px clamp(16px,4vw,40px) 22px;
    background:linear-gradient(0deg, rgba(6,9,13,.92) 20%, rgba(6,9,13,0));
    font-size:clamp(16px,2.6vw,22px); line-height:1.4; font-weight:520; letter-spacing:-.01em; text-wrap:balance;}
  .caption b{color:var(--accent); font-weight:700}
  .caption .pd{color:var(--pd);font-weight:700}.caption .psp{color:var(--psp);font-weight:700}.caption .hc{color:var(--hc);font-weight:700}

  .transport{display:flex; align-items:center; gap:12px; padding:12px clamp(12px,3vw,18px); flex-wrap:wrap}
  .play{flex:none; width:54px;height:54px;border-radius:50%; border:none; cursor:pointer;
    background:radial-gradient(circle at 35% 30%, #ffce8f, var(--accent)); color:#241403; display:grid; place-items:center;
    transition:transform .12s ease; box-shadow:0 0 0 1px rgba(255,255,255,.12), 0 10px 30px -10px var(--accent);}
  .play:hover{transform:scale(1.05)} .play:active{transform:scale(.97)} .play svg{width:23px;height:23px}
  .side{flex:none; width:38px;height:38px;border-radius:50%; background:transparent; border:1px solid var(--line);
    color:var(--muted); cursor:pointer; display:grid;place-items:center; transition:.15s; font-family:var(--mono); font-size:11px}
  .side:hover{color:var(--ink); border-color:var(--faint)} .side svg{width:15px;height:15px}
  .speed{flex:none; height:38px; padding:0 12px; border-radius:19px; background:transparent; border:1px solid var(--line);
    color:var(--muted); cursor:pointer; font-family:var(--mono); font-size:12px; letter-spacing:.03em; transition:.15s; min-width:52px}
  .speed:hover{color:var(--ink); border-color:var(--faint)}
  .meta{flex:1; min-width:160px}
  .meta .t{font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.06em; display:flex; justify-content:space-between; gap:8px}
  .rail{margin-top:7px; height:6px; border-radius:99px; background:rgba(255,255,255,.08); overflow:hidden; cursor:pointer; position:relative}
  .rail .fill{height:100%; width:0%; background:linear-gradient(90deg,var(--accent),#ffd59a); transition:width .1s linear}
  .dots{display:flex; gap:6px; margin-top:9px; flex-wrap:wrap}
  .dots button{width:9px;height:9px;border-radius:50%;border:none;padding:0;cursor:pointer;background:rgba(255,255,255,.14);transition:.2s}
  .dots button.on{background:var(--accent); box-shadow:0 0 8px var(--accent)} .dots button.done{background:var(--faint)}

  /* transcript */
  .transcript{background:linear-gradient(180deg,var(--panel),var(--panel2)); border:1px solid var(--line); border-radius:14px; overflow:hidden}
  .transcript .head{display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--line)}
  .transcript .head span{font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint)}
  .transcript .head .sc{color:var(--accent)}
  .tbody{padding:16px 18px 20px; max-height:190px; overflow-y:auto; font-size:17px; line-height:1.75; color:var(--muted); scroll-behavior:smooth}
  .tbody w{color:var(--muted); transition:color .12s, background .12s; border-radius:4px; padding:0 1px}
  .tbody w.spoken{color:var(--ink)}
  .tbody w.active{color:#241403; background:var(--accent); font-weight:600}
  .tbody::-webkit-scrollbar{width:8px} .tbody::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px}

  .hint{color:var(--faint); font-size:12.5px; font-family:var(--mono); letter-spacing:.02em; text-align:center; display:flex; gap:14px; justify-content:center; flex-wrap:wrap}
  kbd{font-family:var(--mono); font-size:11px; background:rgba(255,255,255,.06); border:1px solid var(--line); border-bottom-width:2px; border-radius:5px; padding:1px 6px; color:var(--muted)}

  .fig{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; gap:clamp(20px,6vw,70px); padding:0 8% 12%}
  .person{display:flex;flex-direction:column;align-items:center;gap:12px}
  .head2{width:clamp(46px,9vw,78px);height:clamp(46px,9vw,78px);border-radius:50%;border:2px solid;display:grid;place-items:center;position:relative}
  .head2 .eyes{display:flex;gap:22%;width:52%}.head2 .eyes i{width:9px;height:9px;border-radius:50%;background:currentColor;display:block}
  .plabel{font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase}
  .fate{font-size:12.5px;color:var(--muted);max-width:16ch;text-align:center;line-height:1.35}
  .vs{font-family:var(--mono);color:var(--faint);font-size:13px;align-self:center;text-align:center}
  .barrow{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;gap:18px;padding:11% 10% 15%}
  .bar{display:flex;align-items:center;gap:14px}
  .bar .bl{font-family:var(--mono);font-size:12px;color:var(--muted);width:120px;flex:none}
  .bar .track{flex:1;height:26px;background:rgba(255,255,255,.05);border-radius:7px;overflow:hidden;border:1px solid var(--line)}
  .bar .val{height:100%;width:0;border-radius:6px;transition:width 1.1s cubic-bezier(.2,.7,.2,1)}
  .bar .sc{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:15px;width:44px;text-align:right;flex:none}

  .player:fullscreen{width:100vw;height:100vh;border-radius:0;display:flex;flex-direction:column}
  .player:fullscreen .stagewrap{flex:1 1 auto;aspect-ratio:auto}
  /* fullscreen transcript window (bottom-right) — hidden unless fullscreen */
  .fsq{position:absolute; right:18px; bottom:96px; z-index:6; width:min(34%,340px); max-height:32%;
    display:none; overflow:hidden; padding:12px 14px; border-radius:12px;
    background:rgba(10,14,20,.82); border:1px solid var(--line); backdrop-filter:blur(6px);
    font-size:14.5px; line-height:1.7; color:var(--muted);}
  .fsq .lab{font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); display:block; margin-bottom:6px}
  .player:fullscreen .fsq{display:block}
  .player:-webkit-full-screen .fsq{display:block}
  .fsq w{color:var(--muted); border-radius:3px; padding:0 1px; transition:color .12s, background .12s}
  .fsq w.spoken{color:var(--ink)} .fsq w.active{color:#241403; background:var(--accent); font-weight:600}
  @media (prefers-reduced-motion:reduce){ *{animation:none!important} .tbody{scroll-behavior:auto} }
  @media (max-width:560px){ .caption{font-size:16px} .play{width:48px;height:48px} }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <h1 id="mh">Narrated explainer</h1>
    <span class="k" id="byline"></span>
  </div>

  <div class="player" id="player">
    <div class="stagewrap">
      <div class="eyebrow"><span class="dot"></span> <span id="eb">The hook</span> <span class="num" id="ebn">01 / 10</span></div>
      <div class="stage" id="stage"></div>
      <div class="fsq" id="fsq" aria-hidden="true"></div>
      <div class="caption" id="cap"></div>
    </div>
    <div class="transport">
      <button class="side" id="rew" aria-label="Rewind 8 seconds"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7a6 6 0 1 1-6 6H4a8 8 0 1 0 8-8z"/></svg></button>
      <button class="play" id="play" aria-label="Play"><svg id="playicon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
      <button class="side" id="next" aria-label="Next scene"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 6l6 6-6 6V6z"/></svg></button>
      <button class="speed" id="speed" aria-label="Playback speed">1.0×</button>
      <button class="side" id="fs" aria-label="Fullscreen"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h6v2H6v4H4V4zm10 0h6v6h-2V6h-4V4zM4 14h2v4h4v2H4v-6zm14 0h2v6h-6v-2h4v-4z"/></svg></button>
      <div class="meta">
        <div class="t"><span id="scenetitle">—</span><span id="counter">1 / 1</span></div>
        <div class="rail" id="rail"><div class="fill" id="fill"></div></div>
        <div class="dots" id="dots"></div>
      </div>
    </div>
  </div>

  <div class="transcript">
    <div class="head"><span>Transcript</span><span class="sc" id="tsc">—</span></div>
    <div class="tbody" id="tbody"></div>
  </div>

  <div class="hint">
    <span><kbd>space</kbd> play/pause</span><span><kbd>←</kbd> <kbd>→</kbd> scenes</span><span><kbd>J</kbd> back 8s</span><span><kbd>F</kbd> fullscreen</span><span>click the bar to scrub</span>
  </div>
</div>

<audio id="au" preload="auto"></audio>
<!-- content (swappable): scene narration timings + scene visuals + page meta -->
<script src="timings.js"></script>
<script src="scenes.js"></script>
<script>
(function(){
  "use strict";
  var stage=document.getElementById('stage');
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  var TIM=window.TIMINGS||[];
  var scenes=window.SCENES||[];
  var META=window.META||{};

  function smoother(t){return t*t*t*(t*(t*6-15)+10);}
  function saccadeY(t,steep){var c=Math.min(Math.max((t-0.5)*steep+0.5,0),1);return smoother(c);}
  function mkCanvas(){var c=document.createElement('canvas');var w=stage.clientWidth||640,h=stage.clientHeight||360;
    var dpr=Math.min(window.devicePixelRatio||1,2);c.width=w*dpr;c.height=h*dpr;c.style.width='100%';c.style.height='100%';
    var x=c.getContext('2d');x.scale(dpr,dpr);stage.appendChild(c);return {c:c,x:x,w:w,h:h};}
  function line(x,pts,color,width,glow){x.save();x.beginPath();for(var i=0;i<pts.length;i++){i?x.lineTo(pts[i][0],pts[i][1]):x.moveTo(pts[i][0],pts[i][1]);}
    x.lineJoin='round';x.lineCap='round';x.strokeStyle=color;x.lineWidth=width||2;if(glow){x.shadowColor=color;x.shadowBlur=glow;}x.stroke();x.restore();}
  function grid(x,w,h){x.save();x.strokeStyle='rgba(255,255,255,.055)';x.lineWidth=1;
    for(var gx=0;gx<=w;gx+=Math.max(28,w/22)){x.beginPath();x.moveTo(gx,0);x.lineTo(gx,h);x.stroke();}
    for(var gy=0;gy<=h;gy+=Math.max(28,h/12)){x.beginPath();x.moveTo(0,gy);x.lineTo(w,gy);x.stroke();}x.restore();}
  var mono=getComputedStyle(document.body).getPropertyValue('--mono');
  var sans=getComputedStyle(document.body).getPropertyValue('--sans');

  var rafid=null,cleanupFn=null;
  function stopScene(){if(rafid){cancelAnimationFrame(rafid);rafid=null;}if(cleanupFn){try{cleanupFn();}catch(e){}cleanupFn=null;}stage.innerHTML='';}
  function loop(fn){var t0=performance.now();function step(now){fn((now-t0)/1000);rafid=requestAnimationFrame(step);}rafid=requestAnimationFrame(step);}

  // Toolkit injected into every scene's build(PE). This is the ONLY interface
  // scenes may use — keeps scenes.js free of engine internals.
  var PE={stage:stage,reduce:reduce,mono:mono,sans:sans,
    smoother:smoother,saccadeY:saccadeY,mkCanvas:mkCanvas,line:line,grid:grid,loop:loop};

  // apply page meta from content (falls back to the static HTML if absent)
  if(META.docTitle)document.title=META.docTitle;
  if(META.heading){var _mh=document.getElementById('mh');if(_mh)_mh.textContent=META.heading;}
  if(META.byline){var _by=document.getElementById('byline');if(_by)_by.textContent=META.byline;}

  var au=document.getElementById('au');
  var idx=0, playing=false, rate=1.0;
  var rates=[0.75,1.0,1.25,1.5,2.0];
  var els={eb:document.getElementById('eb'),ebn:document.getElementById('ebn'),cap:document.getElementById('cap'),
    st:document.getElementById('scenetitle'),ct:document.getElementById('counter'),fill:document.getElementById('fill'),
    dots:document.getElementById('dots'),playicon:document.getElementById('playicon'),tbody:document.getElementById('tbody'),
    tsc:document.getElementById('tsc'),speed:document.getElementById('speed'),fsq:document.getElementById('fsq')};

  if(!scenes.length){els.cap.textContent='No scenes loaded — check that scenes.js is present and sets window.SCENES.';return;}

  scenes.forEach(function(s,i){var b=document.createElement('button');b.setAttribute('aria-label','Scene '+(i+1));b.addEventListener('click',function(){go(i);});els.dots.appendChild(b);});
  function pad(n){return (n<10?'0':'')+n;}

  var wordSpans=[], wordSpansFS=[];
  function buildTranscript(){
    els.tbody.innerHTML='';els.fsq.innerHTML='<span class="lab">Transcript</span>';wordSpans=[];wordSpansFS=[];
    var t=TIM[idx];if(!t){els.tbody.textContent='(no transcript)';return;}
    t.words.forEach(function(wd,i){
      var s=document.createElement('w');s.textContent=wd.w+' ';wordSpans.push(s);els.tbody.appendChild(s);
      var s2=document.createElement('w');s2.textContent=wd.w+' ';wordSpansFS.push(s2);els.fsq.appendChild(s2);
    });
    els.tsc.textContent='Scene '+(idx+1)+' · '+scenes[idx].eyebrow;
  }
  function highlight(t){
    var tm=TIM[idx];if(!tm)return;var active=-1;
    for(var i=0;i<tm.words.length;i++){if(t>=tm.words[i].start){active=i;}else break;}
    for(var j=0;j<wordSpans.length;j++){var c=(j<active)?'spoken':(j===active?'active':'');wordSpans[j].className=c;if(wordSpansFS[j])wordSpansFS[j].className=c;}
    if(active>=0&&wordSpans[active]){var el=wordSpans[active];els.tbody.scrollTop=el.offsetTop-els.tbody.clientHeight/2+el.offsetHeight/2;
      var e2=wordSpansFS[active];if(e2)els.fsq.scrollTop=e2.offsetTop-els.fsq.clientHeight/2+e2.offsetHeight/2;}
  }

  function render(){
    var s=scenes[idx];
    els.eb.textContent=s.eyebrow;els.ebn.textContent=pad(idx+1)+' / '+pad(scenes.length);
    els.cap.innerHTML=s.caption;els.st.textContent=s.title;els.ct.textContent=(idx+1)+' / '+scenes.length;
    [].forEach.call(els.dots.children,function(b,i){b.className=i===idx?'on':(i<idx?'done':'');});
    stopScene();cleanupFn=s.build(PE)||null;
    au.src='audio/scene-'+(idx+1)+'.'+(META.audioExt||'wav');au.load();au.playbackRate=rate;
    buildTranscript();highlight(0);
  }
  var PLAY='<path d="M8 5v14l11-7z"/>',PAUSE='<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
  function setIcon(){els.playicon.innerHTML=playing?PAUSE:PLAY;}

  function playScene(){au.playbackRate=rate;var p=au.play();if(p&&p.catch)p.catch(function(){});}
  au.addEventListener('ended',function(){if(playing){if(idx<scenes.length-1){idx++;render();playScene();}else{playing=false;setIcon();}}});
  au.addEventListener('timeupdate',function(){
    highlight(au.currentTime);
    var frac=au.duration?au.currentTime/au.duration:0;
    els.fill.style.width=(frac*100)+'%';
  });

  function toggle(){playing=!playing;setIcon();if(playing)playScene();else au.pause();}
  function go(i){idx=Math.max(0,Math.min(scenes.length-1,i));render();if(playing)playScene();}

  document.getElementById('play').addEventListener('click',toggle);
  document.getElementById('next').addEventListener('click',function(){if(idx<scenes.length-1)go(idx+1);});
  document.getElementById('rew').addEventListener('click',function(){if(au.currentTime>1.2){au.currentTime=Math.max(0,au.currentTime-8);}else if(idx>0){go(idx-1);}});
  document.getElementById('speed').addEventListener('click',function(){var i=rates.indexOf(rate);rate=rates[(i+1)%rates.length];au.playbackRate=rate;els.speed.textContent=rate+'×';});
  document.getElementById('rail').addEventListener('click',function(e){var r=this.getBoundingClientRect();var f=(e.clientX-r.left)/r.width;if(au.duration)au.currentTime=f*au.duration;});
  var player=document.getElementById('player');
  function toggleFs(){var fe=document.fullscreenElement||document.webkitFullscreenElement;if(fe)(document.exitFullscreen||document.webkitExitFullscreen).call(document);else (player.requestFullscreen||player.webkitRequestFullscreen).call(player);}
  document.getElementById('fs').addEventListener('click',toggleFs);
  function onFs(){setTimeout(function(){var s=scenes[idx];stopScene();cleanupFn=s.build(PE)||null;},60);}
  document.addEventListener('fullscreenchange',onFs);document.addEventListener('webkitfullscreenchange',onFs);
  window.addEventListener('resize',function(){var s=scenes[idx];stopScene();cleanupFn=s.build(PE)||null;});
  document.addEventListener('keydown',function(e){
    if(e.code==='Space'){e.preventDefault();toggle();}
    else if(e.code==='ArrowRight'){if(idx<scenes.length-1)go(idx+1);}
    else if(e.code==='ArrowLeft'){if(idx>0)go(idx-1);}
    else if(e.key==='j'||e.key==='J'){if(au.currentTime>1.2)au.currentTime=Math.max(0,au.currentTime-8);}
    else if(e.key==='f'||e.key==='F'){e.preventDefault();toggleFs();}
  });

  els.speed.textContent='1×';
  render();setIcon();
})();
</script>
</body>
</html>
